<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SPARSH</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo-icon">S</div>
                <h2>SPARSH</h2>
                <p>Student Performance Analysis,<br>Records & Scholastic History</p>
            </div>

            <div id="loginError" class="alert alert-danger hidden" role="alert"></div>

            <form id="loginForm">
                <div class="mb-3">
                    <label for="username" class="form-label text-muted fw-semibold small text-uppercase">Username</label>
                    <input type="text" class="form-control form-control-lg" id="username" placeholder="Enter your username" required>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label text-muted fw-semibold small text-uppercase">Password</label>
                    <div class="input-group">
                        <input type="password" class="form-control form-control-lg border-end-0" id="password" placeholder="••••••••" required>
                        <button class="btn border border-start-0 bg-white" type="button" id="togglePassword" style="border-color: #dee2e6;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-eye text-muted" viewBox="0 0 16 16" id="eyeIcon">
                                <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8zM1.173 8a13.133 13.133 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.133 13.133 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5c-2.12 0-3.879-1.168-5.168-2.457A13.134 13.134 0 0 1 1.172 8z"/>
                                <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5zM4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0z"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <button type="submit" id="submitBtn" class="btn btn-primary btn-lg w-100">Sign In</button>
            </form>
        </div>

        <footer class="mt-auto py-4 text-center mt-5 w-100" style="position: absolute; bottom: 0;">
            <p class="text-muted small mb-2">&copy; 2026 SPARSH - Student Performance Analysis, Records & Scholastic History</p>
            <p class="text-muted small mb-0">
                Designed & Developed by<br>
                <strong class="text-primary">Sreelekshmi S</strong>, PGT CS, PMSHRI KV CRPF Pallipuram (Ernakulam Region)<br>
                <strong style="color: #10b981 !important;">Suraj Verma</strong>, JSA, KV Aurangabad (Patna Region)
            </p>
        </footer>
    </div>

    <!-- Scripts -->
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
</body>
</html>
